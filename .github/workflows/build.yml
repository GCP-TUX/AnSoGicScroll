name: Build y Publicar

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'

jobs:
  # ---------------------------------------------------------------------
  # LINUX (X11 + Wayland) -> genera .deb
  # ---------------------------------------------------------------------
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            codename: noble
          - os: ubuntu-22.04
            codename: jammy
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-base-dev-tools \
            libgl1-mesa-dev \
            libxcb-cursor0 libxcb1-dev libx11-dev \
            libwayland-dev wayland-protocols \
            libpipewire-0.3-dev \
            libopencv-dev \
            pkg-config \
            file dpkg-dev

      - name: Configurar CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Compilar
        run: cmake --build build --config Release

      - name: Generar paquete .deb (CPack)
        run: |
          cd build
          cpack -G DEB

      - name: Subir artefacto .deb
        uses: actions/upload-artifact@v4
        with:
          name: AnSoGicScroll-linux-deb-${{ matrix.codename }}
          path: build/*.deb

      - name: Descargar linuxdeploy y su plugin de Qt
        if: matrix.codename == 'noble'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Construir AppImage
        if: matrix.codename == 'noble'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          mkdir -p AppDir
          export QMAKE=$(which qmake6)
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/AnSoGicScroll \
            --desktop-file resources/linux/ansogicscroll.desktop \
            --icon-file resources/linux/icons/256x256/ansogicscroll.png \
            --plugin qt \
            --output appimage

      - name: Renombrar AppImage
        if: matrix.codename == 'noble'
        run: |
          APPIMAGE_FILE=$(ls AnSoGicScroll*.AppImage)
          echo "Archivo generado: ${APPIMAGE_FILE}"
          if [ "${APPIMAGE_FILE}" != "AnSoGicScroll-x86_64.AppImage" ]; then
            mv "${APPIMAGE_FILE}" AnSoGicScroll-x86_64.AppImage
          fi
          chmod +x AnSoGicScroll-x86_64.AppImage

      - name: Subir artefacto AppImage
        if: matrix.codename == 'noble'
        uses: actions/upload-artifact@v4
        with:
          name: AnSoGicScroll-appimage
          path: AnSoGicScroll-x86_64.AppImage

  # ---------------------------------------------------------------------
  # FEDORA -> genera .rpm con dependencias nativas de Fedora
  # (se compila dentro de un contenedor Fedora, no en el runner Ubuntu,
  # para que las dependencias detectadas usen los nombres de paquete
  # correctos de Fedora/DNF en vez de los de Ubuntu/APT)
  # ---------------------------------------------------------------------
  build-fedora:
    strategy:
      fail-fast: false
      matrix:
        fedora_version: [41, 42]
    runs-on: ubuntu-latest
    container: fedora:${{ matrix.fedora_version }}
    steps:
      - name: Instalar git (necesario para checkout dentro del contenedor)
        run: dnf install -y git

      - uses: actions/checkout@v4

      - name: Instalar dependencias del sistema (dnf)
        run: |
          dnf install -y \
            gcc-c++ cmake ninja-build \
            qt6-qtbase-devel \
            mesa-libGL-devel \
            libxcb-devel libX11-devel \
            wayland-devel wayland-protocols-devel \
            pipewire-devel \
            opencv-devel \
            pkgconf-pkg-config \
            rpm-build

      - name: Configurar CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Compilar
        run: cmake --build build --config Release

      - name: Generar paquete .rpm (CPack)
        run: |
          cd build
          cpack -G RPM

      - name: Subir artefacto .rpm
        uses: actions/upload-artifact@v4
        with:
          name: AnSoGicScroll-fedora-rpm-${{ matrix.fedora_version }}
          path: build/*.rpm

  # ---------------------------------------------------------------------
  # WINDOWS
  # ---------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Instalar OpenCV (vcpkg)
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg.exe install opencv:x64-windows

      - name: Configurar entorno MSVC (cl.exe, link.exe, etc.)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Instalar Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Configurar CMake
        run: cmake -B build -G Ninja -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows -DCMAKE_BUILD_TYPE=Release

      - name: Compilar
        run: cmake --build build --config Release

      - name: Empaquetar dependencias de Qt (windeployqt)
        run: windeployqt.exe --release --no-translations build\AnSoGicScroll.exe

      - name: Subir artefacto (ejecutable)
        uses: actions/upload-artifact@v4
        with:
          name: AnSoGicScroll-windows
          path: |
            build/AnSoGicScroll.exe
            build/*.dll
            build/platforms/**
            build/styles/**
            build/imageformats/**
            build/generic/**

  # ---------------------------------------------------------------------
  # PUBLICAR REPOSITORIO APT (solo al pushear un tag vX.Y.Z)
  # ---------------------------------------------------------------------
  publish-apt-repo:
    needs: [build-linux, build-fedora]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar herramientas de empaquetado
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils gnupg createrepo-c

      - name: Descargar el .deb (noble / Ubuntu 24.04)
        uses: actions/download-artifact@v4
        with:
          name: AnSoGicScroll-linux-deb-noble
          path: dist-noble

      - name: Descargar el .deb (jammy / Ubuntu 22.04)
        uses: actions/download-artifact@v4
        with:
          name: AnSoGicScroll-linux-deb-jammy
          path: dist-jammy

      - name: Descargar el .rpm (Fedora 41)
        uses: actions/download-artifact@v4
        with:
          name: AnSoGicScroll-fedora-rpm-41
          path: dist-rpm-41

      - name: Descargar el .rpm (Fedora 42)
        uses: actions/download-artifact@v4
        with:
          name: AnSoGicScroll-fedora-rpm-42
          path: dist-rpm-42

      - name: Importar clave GPG privada
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent

      - name: Clonar/crear rama gh-pages
        run: |
          git fetch origin gh-pages || true
          git worktree add repo-checkout gh-pages 2>/dev/null || \
            (mkdir repo-checkout && cd repo-checkout && git init && git checkout -b gh-pages && \
             git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git")

      - name: Exportar clave pública al repo
        run: |
          gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > pubkey.gpg
          cp pubkey.gpg repo-checkout/pubkey.gpg

      - name: Construir/actualizar repositorio APT (noble / Ubuntu 24.04)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          REPO_DIR: repo-checkout
          CODENAME: stable
        run: |
          chmod +x scripts/publish-apt-repo.sh
          DEB_PATH=$(find dist-noble -name "*.deb" | head -n1)
          echo "DEB (noble) encontrado: ${DEB_PATH}"
          ./scripts/publish-apt-repo.sh "${DEB_PATH}"

      - name: Construir/actualizar repositorio APT (jammy / Ubuntu 22.04)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          REPO_DIR: repo-checkout
          CODENAME: jammy
        run: |
          chmod +x scripts/publish-apt-repo.sh
          DEB_PATH=$(find dist-jammy -name "*.deb" | head -n1)
          echo "DEB (jammy) encontrado: ${DEB_PATH}"
          ./scripts/publish-apt-repo.sh "${DEB_PATH}"

      - name: Construir/actualizar repositorio RPM (Fedora 41)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          REPO_DIR: repo-checkout
          FEDORA_VER: "41"
        run: |
          chmod +x scripts/publish-rpm-repo.sh
          RPM_PATH=$(find dist-rpm-41 -name "*.rpm" | head -n1)
          echo "RPM (Fedora 41) encontrado: ${RPM_PATH}"
          ./scripts/publish-rpm-repo.sh "${RPM_PATH}"

      - name: Construir/actualizar repositorio RPM (Fedora 42)
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          REPO_DIR: repo-checkout
          FEDORA_VER: "42"
        run: |
          chmod +x scripts/publish-rpm-repo.sh
          RPM_PATH=$(find dist-rpm-42 -name "*.rpm" | head -n1)
          echo "RPM (Fedora 42) encontrado: ${RPM_PATH}"
          ./scripts/publish-rpm-repo.sh "${RPM_PATH}"

      - name: Commit y push a gh-pages
        run: |
          cd repo-checkout
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publicar release ${{ github.ref_name }}" || echo "Sin cambios"
          git push -u origin gh-pages
